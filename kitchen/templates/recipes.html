{% extends "base.html" %}

{% block title %}Recipes - MamaChef{% endblock %}

{% block content %}
<div class="px-4 sm:px-0">
    <h1 class="text-4xl font-bold mb-4">Ricette</h1>
    {% if user.is_authenticated %}
    <c-button link="{% url 'Kitchen:new_recipe' %}" variant="primary" size="lg" class="mb-6">
        Add new Recipe
    </c-button>
    {% endif %}
    
    <p class="text-xl mb-6">Explore our delicious recipes</p>
    <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
        <c-recipe-card 
            title="Pasta alla Carbonara"
            description="The classic Roman recipe with guanciale, eggs, and pecorino"
            difficulty="Medium"
            preparation_time="30"
            author="Chef Mario"
            url="#"
        />
        
        <c-recipe-card 
            title="Pizza Margherita"
            description="The queen of pizzas: tomato, mozzarella, and basil"
            difficulty="Easy"
            preparation_time="45"
            author="Chef Giuseppe"
            url="#"
        />
        
        <c-recipe-card 
            title="Mushroom Risotto"
            description="A creamy risotto with fresh porcini mushrooms"
            difficulty="Hard"
            preparation_time="40"
            author="Chef Anna"
            url="#"
        />
    </div>
</div>
{% endblock %}
