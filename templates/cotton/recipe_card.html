<div class="bg-white rounded-lg shadow-md overflow-hidden hover:shadow-xl transition-shadow duration-300">
    {% if image %}
        <img src="{{ image }}" alt="{{ title }}" class="w-full h-48 object-cover">
    {% else %}
        <div class="w-full h-48 bg-gradient-to-br from-orange-400 to-orange-600 flex items-center justify-center">
            <span class="text-6xl">🍽️</span>
        </div>
    {% endif %}
    
    <div class="p-6">
        <h3 class="text-xl font-semibold text-gray-900 mb-2">{{ title }}</h3>
        
        {% if description %}
            <p class="text-gray-600 mb-4">{{ description }}</p>
        {% endif %}
        
        <div class="flex items-center justify-between text-sm text-gray-500 mb-4">
            {% if difficulty %}
                <span class="inline-flex items-center px-3 py-1 rounded-full text-xs font-medium
                    {% if difficulty == 'Easy' %}
                        bg-green-100 text-green-800
                    {% elif difficulty == 'Medium' %}
                        bg-yellow-100 text-yellow-800
                    {% else %}
                        bg-red-100 text-red-800
                    {% endif %}
                ">
                    {{ difficulty }}
                </span>
            {% endif %}
            
            {% if preparation_time %}
                <span class="flex items-center">
                    <svg class="w-4 h-4 mr-1" fill="currentColor" viewBox="0 0 20 20">
                        <path fill-rule="evenodd" d="M10 18a8 8 0 100-16 8 8 0 000 16zm1-12a1 1 0 10-2 0v4a1 1 0 00.293.707l2.828 2.829a1 1 0 101.415-1.415L11 9.586V6z" clip-rule="evenodd"></path>
                    </svg>
                    {{ preparation_time }} min
                </span>
            {% endif %}
        </div>
        
        {% if author %}
            <div class="text-sm text-gray-500 mb-4">
                <span class="font-medium">Chef:</span> {{ author }}
            </div>
        {% endif %}
        
        <a href="{{ url|default:'#' }}" class="block w-full text-center bg-orange-500 hover:bg-orange-600 text-white font-medium py-2 px-4 rounded-md transition-colors duration-200">
            Vedi Ricetta
        </a>
    </div>
</div>
