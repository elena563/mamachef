<c-vars
    type="button"
    link=""
    icon=""
    icon_only="False"
    variant="primary"
    size=""
    disabled="False"
    aria_label=""
    target=""
    class=""
/>

{% if link != "" %}<a href="{{ link }}" class="{{ class }}" {% if aria_label != "" %}aria-label="{{ aria_label }}"{% endif %} {% if target != "" %}target="{{target}}"{% endif %}>{% endif %}
<button 
    type="{{ type }}"
    class="
        inline-flex items-center justify-center
        font-jua
        {% if icon_only == 'True' %}
            p-2 rounded-full
        {% else %}
            px-4 py-2 rounded-2xl
        {% endif %}
        font-medium text-xl
        transition-colors duration-200
        cursor-pointer
        {% if variant == 'primary' %}
            bg-gradient-pink-mama hover:bg-gradient-pink-mama-dark text-white focus:ring-pink-mama focus:outline-none focus:ring-2 focus:ring-offset-2
        {% elif variant == 'secondary-y' %}
            bg-beige-mama hover:bg-beige-mama-dark text-beige-mama-dark hover:text-white border-beige-mama-dark border-2 focus:ring-beige-mama focus:outline-none focus:ring-2 focus:ring-offset-2
        {% elif variant == 'secondary-b' %}
            bg-light-blue hover:bg-blue-mama-dark hover:text-white text-blue-mama-dark border-blue-mama-dark border-2 focus:ring-blue-mama focus:outline-none focus:ring-2 focus:ring-offset-2
        {% elif variant == 'secondary-p' %}
            bg-light-pink hover:bg-pink-mama-dark hover:text-white text-pink-mama-dark border-pink-mama-dark border-2 focus:ring-pink-mama focus:outline-none focus:ring-2 focus:ring-offset-2
        {% elif variant == 'danger' %}
            bg-red-500 hover:bg-red-600 text-white focus:ring-red-500 focus:outline-none focus:ring-2 focus:ring-offset-2
        {% elif variant == 'success' %}
            bg-gradient-blue-mama hover:bg-gradient-blue-mama-dark text-white focus:ring-blue-mama focus:outline-none focus:ring-2 focus:ring-offset-2
        {% elif variant == 'ghost' %}
            text-gray-600 hover:text-pink-mama hover:bg-pink-mama/10
        {% endif %}
        {% if size == 'sm' %}
            {% if icon_only == 'True' %}p-1.5 text-xs{% else %}px-3 py-1.5 text-xs{% endif %}
        {% elif size == 'lg' %}
            {% if icon_only == 'True' %}p-3 text-base{% else %}px-6 py-3 text-base{% endif %}
        {% endif %}
        {% if disabled == 'True' %}
            opacity-50 cursor-not-allowed
        {% endif %}
        {% if link == "" %}{{ class }}{% else %}w-full{% endif %}
    "
    {% if disabled == 'True' %}disabled{% endif %}
    {{ attrs }}
>
    {% if icon == 'heart' %}
        <svg xmlns='http://www.w3.org/2000/svg' fill='none' viewBox='0 0 24 24' stroke-width='1.5' stroke='currentColor' class='w-6 h-6{% if icon_only != "True" %} mr-2{% endif %}'>
            <path stroke-linecap='round' stroke-linejoin='round' d='M21 8.25c0-2.485-2.099-4.5-4.688-4.5-1.935 0-3.597 1.126-4.312 2.733-.715-1.607-2.377-2.733-4.313-2.733C5.1 3.75 3 5.765 3 8.25c0 7.22 9 12 9 12s9-4.78 9-12z' />
        </svg>
    {% endif %}
    {{ slot }}
</button>
{% if link != "" %}</a>{% endif %}
