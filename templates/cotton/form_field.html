<div class="mb-4">
    <label for="{{ field.id_for_label }}" class="block text-gray-700 font-medium mb-2">
        {{ field.label }}
        {% if field.field.required %}
            <span class="text-red-500">*</span>
        {% endif %}
    </label>
    
    {% if field.field.widget.input_type == 'textarea' %}
        <textarea 
            name="{{ field.name }}" 
            id="{{ field.id_for_label }}"
            class="w-full px-3 py-2 border border-gray-300 rounded-md focus:outline-none focus:ring-2 focus:ring-orange-500 focus:border-transparent"
            {% if field.field.required %}required{% endif %}
            rows="4"
        >{{ field.value|default:'' }}</textarea>
    {% elif field.field.widget.input_type == 'select' %}
        <select 
            name="{{ field.name }}" 
            id="{{ field.id_for_label }}"
            class="w-full px-3 py-2 border border-gray-300 rounded-md focus:outline-none focus:ring-2 focus:ring-orange-500 focus:border-transparent"
            {% if field.field.required %}required{% endif %}
        >
            {% for value, label in field.field.choices %}
                <option value="{{ value }}" {% if field.value == value %}selected{% endif %}>
                    {{ label }}
                </option>
            {% endfor %}
        </select>
    {% else %}
        <input 
            type="{{ field.field.widget.input_type|default:'text' }}" 
            name="{{ field.name }}" 
            id="{{ field.id_for_label }}"
            value="{{ field.value|default:'' }}"
            class="w-full px-3 py-2 border border-gray-300 rounded-md focus:outline-none focus:ring-2 focus:ring-orange-500 focus:border-transparent"
            {% if field.field.required %}required{% endif %}
        />
    {% endif %}
    
    {% if field.help_text %}
        <p class="text-gray-500 text-sm mt-1">{{ field.help_text }}</p>
    {% endif %}
    
    {% if field.errors %}
        <p class="text-red-500 text-sm mt-1">{{ field.errors.0 }}</p>
    {% endif %}
</div>
